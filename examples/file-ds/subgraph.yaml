specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: ERC721
    network: mainnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ERC721
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NFT
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./target/wasm32-unknown-unknown/release/file_ds_subgraph.wasm
templates:
  - kind: file/ipfs
    name: NFTMetadata
    mapping:
      kind: file/ipfs
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - NFT
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
      file: ./target/wasm32-unknown-unknown/release/file_ds_subgraph.wasm
      handler: handleNFTMetadata
