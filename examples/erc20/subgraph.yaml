specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ERC20
    network: mainnet
    source:
      # USDC on mainnet - change to your target contract
      address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
      abi: ERC20
      startBlock: 6082465
    mapping:
      kind: wasm/rust
      apiVersion: 0.0.7
      language: rust
      entities:
        - Token
        - Account
        - TokenBalance
        - Transfer
      abis:
        - name: ERC20
          file: ./abis/ERC20.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handle_transfer
      file: ../../target/wasm32-unknown-unknown/release/erc20_subgraph.wasm
