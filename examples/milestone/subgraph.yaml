specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Milestone
    network: arbitrum-one
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Dummy
      startBlock: 330000000
    mapping:
      kind: wasm/assemblyscript
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Ping
      abis:
        - name: Dummy
          file: ./abis/Dummy.json
      blockHandlers:
        - handler: handle_block
      file: ./milestone.wasm
