specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ERC721
    network: arbitrum-one
    source:
      # Uniswap V3 NonfungiblePositionManager — Arbitrum One
      address: "0xC36442b4a4522E871399CD717aBDD847Ab11FE88"
      abi: ERC721
      startBlock: 450708728
    mapping:
      kind: wasm/assemblyscript
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Token
        - Transfer
        - Approval
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handle_transfer
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handle_approval
      file: ../../target/wasm32-unknown-unknown/release/erc721_subgraph.wasm
