specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ERC721
    network: arbitrum-one
    source:
      # Smol Brains NFT — Arbitrum One (TreasureDAO)
      address: "0x6325439389E0797Ab35752B4F43a14C004f22A9C"
      abi: ERC721
      startBlock: 1800000
    mapping:
      kind: wasm/rust
      apiVersion: 0.0.7
      language: rust
      entities:
        - Token
        - Transfer
        - Approval
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handle_transfer
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handle_approval
      file: ../../target/wasm32-unknown-unknown/release/erc721_subgraph.wasm
