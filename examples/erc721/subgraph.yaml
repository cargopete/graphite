specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ERC721
    network: mainnet
    source:
      # CryptoPunks (wrapped) on mainnet — replace with your target contract
      address: "0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB"
      abi: ERC721
      startBlock: 3914495
    mapping:
      kind: wasm/rust
      apiVersion: 0.0.7
      language: rust
      entities:
        - Token
        - Transfer
        - Approval
      abis:
        - name: ERC721
          file: ./abis/ERC721.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handle_transfer
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handle_approval
      file: ../../target/wasm32-unknown-unknown/release/erc721_subgraph.wasm
